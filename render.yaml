services:
  - type: web
    name: cricshot
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_SERVER
        value: mail.smtp2go.com
      - key: MAIL_PORT
        value: 2525
      - key: MAIL_USE_TLS
        value: "True"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: TWI_ACCOUNT_SID
        sync: false
      - key: TWI_AUTH_TOKEN
        sync: false
      - key: TWI_PHONE_NUMBER
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
